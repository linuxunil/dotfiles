# ~/.config/mise/config.toml
[env]
MISE_AUTO_INSTALL = true
MISE_EXPERIMENTAL = true
# Performance and output settings
MISE_TASK_OUTPUT = "prefix"  # Shows task names with output, useful for parallel tasks
MISE_TASK_TIMINGS = true     # Show elapsed time for each task
MISE_JOBS = 6                # Run up to 4 tasks concurrently
MISE_HTTP_TIMEOUT = "30s"   # Faster timeout for HTTP requests
MISE_FETCH_REMOTE_VERSIONS_TIMEOUT = "10s"  # Faster timeout for version checks

[tools]
bat = "latest"
bottom = "latest"
chezmoi = "latest"
eza = "latest"
fd = "latest"
go = "latest"
golangci-lint = "latest"
gofumpt = "latest"
jq = "latest"
pandoc = "latest"
pipx = "latest"
python = "latest"
ripgrep = "latest"
shellcheck = "latest"
shfmt = "latest"
starship = "latest"
watchexec = "latest"
zoxide = "latest"

# Go Tools
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
"go:github.com/cosmtrek/air" = "latest"
"go:github.com/pressly/goose/v3/cmd/goose" = "latest"

# Python Tools
"pipx:mypy" = "latest"
"pipx:ruff" = "latest"
uv = "latest"

# Secrets Management
sops = "latest"
age = "latest"

zellij = "latest"
fzf = "latest"
lazygit = "latest"

[settings]
experimental = true
# Performance optimizations
jobs = 6
# Better task output
task_output = "prefix"
task_timings = true

# SOPS settings - use rops for TOML support
[settings.sops]
rops = true

# Cargo backend settings are in the [settings] section
# cargo.binstall = true

[settings.python]
uv_venv_auto = true
