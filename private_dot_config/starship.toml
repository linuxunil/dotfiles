style_root = "tokyo_night_red"

[directory]
style = "tokyo_night_blue"
read_only = " ¾░î¥"
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = "´Éİ "
style = "tokyo_night_purple"
format = "[$symbol $branch]($style) "

[git_status]
style = "tokyo_night_red"
format = "[$all_status$ahead_behind]($style) "

[cmd_duration]
min_time = 500
format = "[$duration]($style) "
style = "tokyo_night_yellow"

[character]
success_symbol = "[ÔØ»](tokyo_night_green)"
error_symbol = "[ÔØ»](tokyo_night_red)"
vimcmd_symbol = "[ÔØ«](tokyo_night_green)"

