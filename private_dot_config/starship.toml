# ============================================================================
# A minimal, blazing-fast, and infinitely customizable prompt for any shell.
# Get started: https://starship.rs/
#
# ----------------------------------------------------------------------------
# ­şÄ¿ Palette - Tokyo Night
# ----------------------------------------------------------------------------
[palette]
tokyo_night_storm = { fg = "#a9b1d6", bg = "#24283b" }
tokyo_night_blue = { fg = "#7aa2f7", bg = "#24283b" }
tokyo_night_cyan = { fg = "#7dcfff", bg = "#24283b" }
tokyo_night_green = { fg = "#9ece6a", bg = "#24283b" }
tokyo_night_orange = { fg = "#ff9e64", bg = "#24283b" }
tokyo_night_purple = { fg = "#bb9af7", bg = "#24283b" }
tokyo_night_red = { fg = "#f7768e", bg = "#24283b" }
tokyo_night_yellow = { fg = "#e0af68", bg = "#24283b" }

# ----------------------------------------------------------------------------
# ­şÜÇ Prompt Configuration
# ----------------------------------------------------------------------------
format = """
$os\
$username\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[os]
format = "[$symbol]($style) "
style = "tokyo_night_purple"
disabled = false

